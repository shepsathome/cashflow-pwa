<!DOCTYPE html><html><head><title>Clearing cache...</title></head><body>
<h3>Clearing service worker cache...</h3><pre id="log"></pre>
<script>
const log = document.getElementById('log');
async function clearAll() {
  log.textContent += 'Unregistering service workers...\n';
  const regs = await navigator.serviceWorker.getRegistrations();
  for (const r of regs) { await r.unregister(); log.textContent += '  Unregistered: ' + r.scope + '\n'; }
  log.textContent += 'Clearing caches...\n';
  const names = await caches.keys();
  for (const n of names) { await caches.delete(n); log.textContent += '  Deleted cache: ' + n + '\n'; }
  log.textContent += '\nDone! Redirecting in 2 seconds...';
  setTimeout(() => window.location.href = 'index.html', 2000);
}
clearAll();
</script></body></html>
